<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網頁跳轉中... | 瑞陞租車 RS Limo</title>
    
    <!-- 1. Meta Refresh 強制跳轉 (0秒後跳轉) -->
    <meta http-equiv="refresh" content="0;url=http://www.rs-limo.com/">
    
    <!-- 2. SEO 權重轉移宣告 -->
    <link rel="canonical" href="http://www.rs-limo.com/">
    
    <style>
        body {
            background-color: #050505;
            color: #E0E0E0;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-top: 3px solid #D4AF37;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            color: #D4AF37;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        p {
            color: #888;
            font-size: 14px;
        }
        a {
            color: #D4AF37;
            text-decoration: none;
            margin-top: 15px;
            border-bottom: 1px solid #D4AF37;
            padding-bottom: 2px;
        }
        a:hover {
            color: #F9E498;
        }
    </style>

    <!-- 3. JavaScript 強制替換 (最高優先級，且不會產生上一頁的歷史紀錄) -->
    <script>
        window.location.replace("http://www.rs-limo.com/");
    </script>
</head>
<body>
    <div class="loader"></div>
    <h2>正在為您跳轉至全新官網</h2>
    <p>Please wait while we redirect you to our new website...</p>
    <p>如果系統沒有自動跳轉，請點擊下方連結：</p>
    <a href="http://www.rs-limo.com/">前往 瑞陞租車 RS LIMO 官網</a>
</body>
</html>
